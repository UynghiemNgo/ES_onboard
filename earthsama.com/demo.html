<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Earth Sama — Mobile App Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', system-ui, sans-serif; background: #1a1a1a; color: #f5f0e8; }

:root {
  --earth: #8B6914;
  --earth-light: #c9a96e;
  --earth-dark: #5a4410;
  --moss: #4a6741;
  --moss-light: #6b8f60;
  --cream: #f5f0e8;
  --charcoal: #2c2c2c;
  --warm-gray: #a09080;
  --phone-w: min(352px, 84vw);
  --radius: 46px;
  --crop-top: 36px; /* trims native status bar without cutting content */
  --crop-bottom: 0px; /* optional: hide native home bar / stray CTA in PNG */
}

/* === LAYOUT === */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* === HEADER === */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: linear-gradient(135deg, #1f1f1f 0%, #2a2520 100%);
  border-bottom: 1px solid rgba(139,105,20,0.3);
  flex-shrink: 0;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-logo img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
}
.header-logo span {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--earth-light);
}
.header-badge {
  font-size: 10px;
  background: var(--earth);
  color: var(--cream);
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* === FLOW SELECTOR === */
.flow-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: #222;
  border-bottom: 1px solid rgba(139,105,20,0.2);
  padding: 8px 12px;
  flex-shrink: 0;
}
.flow-meta {
  font-size: 11px;
  color: var(--warm-gray);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.flow-select {
  appearance: none;
  -webkit-appearance: none;
  border: 1px solid rgba(139,105,20,0.45);
  background: #1b1b1b;
  color: var(--cream);
  border-radius: 8px;
  font-size: 12px;
  padding: 7px 28px 7px 10px;
  font-family: inherit;
  max-width: 62%;
  cursor: pointer;
  background-image: linear-gradient(45deg, transparent 50%, var(--earth-light) 50%), linear-gradient(135deg, var(--earth-light) 50%, transparent 50%);
  background-position: calc(100% - 14px) calc(50% - 3px), calc(100% - 9px) calc(50% - 3px);
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
}

/* === PHONE VIEWPORT === */
.phone-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 10px;
  overflow: hidden;
  position: relative;
  background: radial-gradient(ellipse at center, #2a2520 0%, #1a1a1a 70%);
}

.phone-frame {
  width: var(--phone-w);
  aspect-ratio: 393 / 852;
  height: auto;
  max-height: min(860px, calc(100dvh - 184px));
  max-width: 84vw;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  background: #111;
  box-shadow:
    0 0 0 2px #4a4a4a,
    0 0 0 5px #1b1b1b,
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 0 1px rgba(255,255,255,0.1);
}

/* Notch */
.phone-frame::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 32px;
  background: #1a1a1a;
  border-radius: 0 0 18px 18px;
  z-index: 130;
}
.phone-frame::after {
  content: '';
  position: absolute;
  inset: 9px;
  border-radius: 38px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  pointer-events: none;
  z-index: 129;
}

.phone-screen {
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: relative;
  background: #f8f6f2;
}
.phone-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: var(--screen-bg);
  background-size: cover;
  background-position: center 10%;
  transform: scale(1.18);
  filter: blur(24px) saturate(0.84);
  opacity: 0.22;
  z-index: 0;
}
.phone-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(248,246,242,0.14), rgba(248,246,242,0.08) 35%, rgba(248,246,242,0.18));
  z-index: 0;
}

.screen-img {
  width: calc(100% + 2px);
  height: calc(100% + var(--crop-top) + var(--crop-bottom));
  object-fit: contain;
  object-position: center top;
  background: transparent;
  transition: opacity 0.3s ease;
  user-select: none;
  -webkit-user-drag: none;
  position: relative;
  z-index: 1;
  margin: calc(-1 * var(--crop-top)) -1px calc(-1 * var(--crop-bottom)) -1px;
}
.ui-overlay {
  position: absolute;
  inset: 0;
  z-index: 95;
  pointer-events: none;
}
.ui-overlay.hidden { display: none; }
.mock-status-shell {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 34px;
  background: linear-gradient(180deg, rgba(248,246,242,0.98), rgba(248,246,242,0.86), rgba(248,246,242,0));
  z-index: 20;
}
.mock-status-shell--dark {
  background: linear-gradient(180deg, rgba(18,18,20,0.88), rgba(18,18,20,0.45), rgba(18,18,20,0));
}
/* Select Language: mock status + plate sit higher under notch */
.phone-screen[data-lift-status] .mock-status-shell {
  top: -6px;
}
.phone-screen[data-lift-status] .mock-status {
  top: -4px;
}
/* Scan ID + Signature: lift status row and shorten plate so PNG titles / camera aren’t covered */
.phone-screen[data-lift-verify-overlay] .mock-status-shell {
  top: -8px;
}
.phone-screen[data-lift-verify-overlay] .mock-status {
  top: -6px;
}
.phone-screen[data-lift-verify-overlay] .mock-toolbar-plate {
  top: -2px;
  height: 48px;
}
.phone-screen[data-lift-verify-overlay] .mock-toolbar-plate--camera {
  height: 40px;
}
.phone-screen[data-lift-verify-overlay] .mock-nav {
  top: 26px;
}
.phone-screen[data-lift-verify-overlay] .mock-signature {
  top: 122px;
  bottom: 124px;
}
.mock-status {
  position: absolute;
  top: 2px;
  left: 0;
  right: 0;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  font-size: 11px;
  font-weight: 700;
  color: #1e1e1e;
  z-index: 21;
}
.mock-status--light { color: #fff; }
.mock-status-right {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.mock-sig-bars {
  display: inline-flex;
  align-items: flex-end;
  gap: 2px;
  height: 10px;
}
.mock-sig-bars span {
  width: 3px;
  border-radius: 1px;
  background: currentColor;
  opacity: 0.95;
}
.mock-sig-bars span:nth-child(1) { height: 4px; }
.mock-sig-bars span:nth-child(2) { height: 6px; }
.mock-sig-bars span:nth-child(3) { height: 8px; }
.mock-wifi {
  position: relative;
  display: inline-block;
  width: 13px;
  height: 10px;
  border: 1.5px solid currentColor;
  border-top: none;
  border-radius: 0 0 4px 4px;
  opacity: 0.95;
  box-sizing: border-box;
  vertical-align: middle;
}
.mock-wifi::before {
  content: '';
  position: absolute;
  width: 7px;
  height: 5px;
  border: 1.5px solid currentColor;
  border-top: none;
  border-radius: 0 0 2px 2px;
  left: 50%;
  transform: translateX(-50%);
  top: 2px;
  box-sizing: border-box;
}
.sig-cell, .sig-dot {
  display: inline-block;
  background: currentColor;
  border-radius: 999px;
  opacity: 0.9;
}
.sig-cell { width: 15px; height: 8px; border: 1.5px solid currentColor; background: transparent; }
.sig-dot { width: 4px; height: 4px; }
.mock-nav {
  position: absolute;
  top: 32px;
  left: 0;
  right: 0;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 18px;
  color: #3a3a3a;
  font-weight: 700;
  font-size: 15px;
}
.mock-nav::before {
  content: '';
  position: absolute;
  left: 16px;
  width: 10px;
  height: 10px;
  border-left: 2px solid currentColor;
  border-bottom: 2px solid currentColor;
  transform: rotate(45deg);
}
.mock-bottom-stack {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.mock-button, .mock-button-secondary {
  border-radius: 16px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.01em;
}
.mock-button { background: #c78f58; color: #fff; }
.mock-button-secondary { background: rgba(255,255,255,0.92); color: #b77c42; border: 1.5px solid rgba(183,124,66,0.45); }
.mock-chip-row {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 76px;
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.mock-chip {
  background: rgba(48,48,48,0.72);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 600;
  backdrop-filter: blur(6px);
}
.mock-note {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 84px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.92);
  color: #4a4a4a;
  font-size: 12px;
  line-height: 1.35;
  box-shadow: 0 8px 22px rgba(0,0,0,0.08);
}
.mock-signature {
  position: absolute;
  left: 20px;
  right: 20px;
  top: 108px;
  bottom: 112px;
  border-radius: 18px;
  border: 2px dashed rgba(139,105,20,0.28);
  background: rgba(255,255,255,0.52);
}
.mock-signature::before {
  content: 'Sign inside the box';
  position: absolute;
  top: 14px;
  left: 16px;
  font-size: 12px;
  color: rgba(139,105,20,0.72);
  font-weight: 600;
}
.mock-signature svg {
  position: absolute;
  left: 22px;
  right: 22px;
  bottom: 48px;
  width: calc(100% - 44px);
  height: 120px;
}
.mock-stepper {
  position: absolute;
  left: 16px;
  right: 16px;
  top: 82px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.mock-step {
  border-radius: 12px;
  background: rgba(255,255,255,0.94);
  border: 1px solid rgba(139,105,20,0.2);
  padding: 10px 6px;
  text-align: center;
  font-size: 10px;
  color: #6d6a63;
  font-weight: 700;
}
.mock-step.active {
  background: #edf4de;
  color: #6f9f20;
  border-color: rgba(111,159,32,0.35);
}
.mock-capture-footer {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.mock-toolbar-plate {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 84px;
  background: linear-gradient(180deg, rgba(248,246,242,0.98), rgba(248,246,242,0.92));
  z-index: 1;
}
.mock-toolbar-plate--compact {
  height: 56px;
  background: linear-gradient(180deg, rgba(248,246,242,0.98), rgba(248,246,242,0.93) 55%, rgba(248,246,242,0.78));
}
.mock-toolbar-plate--camera {
  background: linear-gradient(180deg, rgba(28,28,30,0.55), rgba(28,28,30,0.22));
}

/* Swipe overlay zones */
.swipe-zone {
  position: absolute;
  top: 0;
  height: 100%;
  width: 35%;
  z-index: 50;
  cursor: pointer;
}
.swipe-zone.left { left: 0; }
.swipe-zone.right { right: 0; }
.swipe-zone:active { background: rgba(255,255,255,0.05); }

/* Slide transition */
.phone-screen.slide-left .screen-img {
  animation: slideOutLeft 0.3s ease forwards;
}
.phone-screen.slide-right .screen-img {
  animation: slideOutRight 0.3s ease forwards;
}
.phone-screen.slide-in-left .screen-img {
  animation: slideInFromRight 0.3s ease forwards;
}
.phone-screen.slide-in-right .screen-img {
  animation: slideInFromLeft 0.3s ease forwards;
}

@keyframes slideOutLeft {
  to { transform: translateX(-100%); opacity: 0; }
}
@keyframes slideOutRight {
  to { transform: translateX(100%); opacity: 0; }
}
@keyframes slideInFromRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes slideInFromLeft {
  from { transform: translateX(-100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* === BOTTOM CONTROLS === */
.controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: #222;
  border-top: 1px solid rgba(139,105,20,0.2);
  flex-shrink: 0;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid rgba(139,105,20,0.4);
  color: var(--earth-light);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.2s ease;
}
.nav-btn:hover { background: rgba(139,105,20,0.15); border-color: var(--earth); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn:disabled:hover { background: none; }

.nav-btn svg { width: 14px; height: 14px; }

.screen-info {
  text-align: center;
}
.screen-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--cream);
  margin-bottom: 2px;
}
.screen-counter {
  font-size: 11px;
  color: var(--warm-gray);
}

/* === KEYBOARD HINT === */
.keyboard-hint {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: rgba(160,144,128,0.5);
  letter-spacing: 0.5px;
  pointer-events: none;
  display: none;
}

/* === RESPONSIVE === */
@media (max-width: 480px) {
  .header { padding: 8px 12px; }
  .header-logo span { font-size: 14px; }
  .phone-area { padding: 8px; }
  .controls { padding: 8px 12px; }
  :root { --radius: 30px; --phone-w: min(390px, 96vw); }
  .phone-frame::before { width: 120px; height: 24px; }
  .flow-select { max-width: 70%; }
}
@media (max-height: 600px) {
  .phone-frame { max-height: calc(100dvh - 150px); }
}

/* Prefers reduced motion */
@media (prefers-reduced-motion: reduce) {
  .phone-screen.slide-left .screen-img,
  .phone-screen.slide-right .screen-img,
  .phone-screen.slide-in-left .screen-img,
  .phone-screen.slide-in-right .screen-img {
    animation: none;
  }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <img src="pitch-assets/logo-icon.png" alt="Earth Sama">
      <span>Earth Sama</span>
    </div>
    <div class="header-badge">INTERACTIVE DEMO</div>
  </div>

  <!-- Flow Selector -->
  <div class="flow-bar">
    <div class="flow-meta" id="flowMeta">Flow 1 / 8</div>
    <select class="flow-select" id="flowSelect" aria-label="Select demo flow"></select>
  </div>

  <!-- Phone Viewport -->
  <div class="phone-area">
    <div class="phone-frame">
      <div class="phone-screen" id="phoneScreen">
        <img class="screen-img" id="screenImg" src="" alt="App screen">
        <div class="ui-overlay hidden" id="uiOverlay"></div>
        <div class="swipe-zone left" id="swipeLeft"></div>
        <div class="swipe-zone right" id="swipeRight"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Controls -->
  <div class="controls">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Prev
    </button>
    <div class="screen-info">
      <div class="screen-label" id="screenLabel">—</div>
      <div class="screen-counter" id="screenCounter">—</div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">
      Next
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>

<div class="keyboard-hint">Arrow keys / swipe / tap sides to navigate</div>

<script>
/* === FLOW DATA === */
const flows = [
  {
    id: 'start',
    label: 'Start',
    screens: [
      { file: 'f004-004.png', label: 'Splash Screen' },
      { file: 'f060-060.png', label: 'Welcome — Sign In' },
      { file: 'f006-006.png', label: 'Select Language' },
      { file: 'f009-009.png', label: 'Privacy & Consent' },
    ]
  },
  {
    id: 'verify',
    label: 'Verify',
    screens: [
      { file: 'f100-100.png', label: 'Face Scan' },
      { file: 'f013-013.png', label: 'Face Verification' },
      { file: 'f110-110.png', label: 'Select ID Type' },
      { file: 'f050-050.png', label: 'Scan ID — Front' },
      { file: 'f045-045.png', label: 'Write Signature' },
    ]
  },
  {
    id: 'land',
    label: 'Land',
    screens: [
      { file: 'f130-130.png', label: 'Land Title — Ownership' },
      { file: 'f390-390.png', label: 'GPS Tracking — Satellite View' },
    ]
  },
  {
    id: 'tasks',
    label: 'Tasks',
    screens: [
      { file: 'f260-260.png', label: 'Task List — To Do' },
      { file: 'f320-320.png', label: 'Clear the Land — Start' },
      { file: 'f290-290.png', label: 'Video Guide — Dig Soil' },
      { file: 'f370-370.png', label: 'Step 1 — Till the Soil' },
      { file: 'f380-380.png', label: 'Photo Capture — Summary' },
      { file: 'f350-350.png', label: 'Tasks Done — Need Review' },
    ]
  },
  {
    id: 'finish',
    label: 'Finish',
    screens: [
      { file: 'f210-210.png', label: 'Identity Linked' },
      { file: 'f330-330.png', label: 'User Profile' },
      { file: 'f080-080.png', label: 'Learn While You Wait' },
    ]
  }
];

/* === STATE === */
let currentFlowIdx = 0;
let currentScreenIdx = 0;
const visited = new Set();
const basePath = 'demo-frames/';

/* === DOM === */
const flowSelectEl = document.getElementById('flowSelect');
const flowMetaEl = document.getElementById('flowMeta');
const phoneScreen = document.getElementById('phoneScreen');
const screenImg = document.getElementById('screenImg');
const screenLabel = document.getElementById('screenLabel');
const screenCounter = document.getElementById('screenCounter');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const uiOverlay = document.getElementById('uiOverlay');

/** Per-frame top trim (hides duplicate status bar). Full-screen camera/ID scan needs less crop. */
const cropTopByFile = {
  /* Start flow: raise trim so mock status aligns; hide duplicate status band */
  'f006-006.png': '58px',
  'f009-009.png': '44px',
  /* Verify: less top trim so mock chrome doesn’t hide in-frame titles / camera guide */
  'f050-050.png': '4px',
  'f045-045.png': '20px'
};

/** Per-frame bottom trim: clips native brown CTA / home strip in PNG (mock buttons replace). */
const cropBottomByFile = {
  'f006-006.png': '56px',
  'f009-009.png': '72px',
  /* Remove native in-frame CTA so overlay CTA does not look duplicated */
  'f050-050.png': '64px',
  'f045-045.png': '92px',
  'f370-370.png': '92px'
};

const screenFixes = {
  'f006-006.png': {
    html: `
      <div class="mock-toolbar-plate mock-toolbar-plate--compact"></div>
    `
  },
  'f009-009.png': {
    html: `
      <div class="mock-toolbar-plate"></div>
      <div class="mock-bottom-stack">
        <div class="mock-button">Accept & Continue</div>
        <div class="mock-button-secondary">Review Privacy Terms</div>
      </div>
    `
  },
  'f013-013.png': {
    html: `
      <div class="mock-chip-row">
        <div class="mock-chip">Move closer if your face is too small</div>
        <div class="mock-chip">Move back if your face is cropped</div>
      </div>
    `
  },
  'f050-050.png': {
    html: `
      <div class="mock-note">Align the front of your ID inside the guide so all text and corners are visible.</div>
      <div class="mock-bottom-stack">
        <div class="mock-button">Capture Front of ID</div>
      </div>
    `
  },
  'f045-045.png': {
    html: `
      <div class="mock-toolbar-plate mock-toolbar-plate--compact"></div>

/* === INIT === */
function init() {
  renderFlowTabs();
  loadScreen(0, 0);
  bindEvents();
}

function renderFlowTabs() {
  flowSelectEl.innerHTML = flows.map((f, i) =>
    `<option value="${i}" ${i === 0 ? 'selected' : ''}>${f.label}</option>`
  ).join('');
}

function renderProgressDots() {
  const progressDotsEl = document.getElementById('progressDots');
  if (!progressDotsEl) return;
  const screens = flows[currentFlowIdx].screens;
  progressDotsEl.innerHTML = screens.map((s, i) => {
    const key = `${currentFlowIdx}-${i}`;
    const cls = i === currentScreenIdx ? 'active' : visited.has(key) ? 'visited' : '';
    return `<div class="progress-dot ${cls}" onclick="goToScreen(${i})"></div>`;
  }).join('');
}

function switchFlow(idx) {
  if (idx === currentFlowIdx) return;
  currentFlowIdx = idx;
  currentScreenIdx = 0;
  loadScreen(currentFlowIdx, 0, 'left');
  flowSelectEl.value = String(idx);
}

function loadScreen(flowIdx, screenIdx, direction) {
  const flow = flows[flowIdx];
  const screen = flow.screens[screenIdx];
  const key = `${flowIdx}-${screenIdx}`;
  const screenUrl = `url("${basePath + screen.file}")`;
  visited.add(key);
  phoneScreen.style.setProperty('--screen-bg', screenUrl);
  if (screen.file === 'f006-006.png') {
    phoneScreen.setAttribute('data-lift-status', '');
  } else {
    phoneScreen.removeAttribute('data-lift-status');
  }
  if (screen.file === 'f045-045.png') {
    phoneScreen.setAttribute('data-lift-verify-overlay', '');
  } else {
    phoneScreen.removeAttribute('data-lift-verify-overlay');
  }
  if (cropTopByFile[screen.file] !== undefined) {
    phoneScreen.style.setProperty('--crop-top', cropTopByFile[screen.file]);
  } else {
    phoneScreen.style.removeProperty('--crop-top');
  }
  if (cropBottomByFile[screen.file] !== undefined) {
    phoneScreen.style.setProperty('--crop-bottom', cropBottomByFile[screen.file]);
  } else {
    phoneScreen.style.removeProperty('--crop-bottom');
  }

  if (direction) {
    phoneScreen.className = 'phone-screen slide-' + direction;
    setTimeout(() => {
      screenImg.src = basePath + screen.file;
      phoneScreen.className = 'phone-screen slide-in-' + direction;
      setTimeout(() => { phoneScreen.className = 'phone-screen'; }, 300);
    }, 150);
  } else {
    screenImg.src = basePath + screen.file;
  }

  screenLabel.textContent = screen.label;
  screenCounter.textContent = `${screenIdx + 1} / ${flow.screens.length} — ${flow.label}`;
  flowMetaEl.textContent = `Flow ${flowIdx + 1} / ${flows.length}`;
  renderScreenFix(screen.file);

  prevBtn.disabled = (flowIdx === 0 && screenIdx === 0);
  nextBtn.disabled = (flowIdx === flows.length - 1 && screenIdx === flow.screens.length - 1);

  renderProgressDots();
}

function renderScreenFix(file) {
  const fix = screenFixes[file];
  const scanId = file === 'f050-050.png';
  const shellCls = scanId ? 'mock-status-shell mock-status-shell--dark' : 'mock-status-shell';
  const statusCls = scanId ? 'mock-status mock-status--light' : 'mock-status';
  const rightIcons = scanId
    ? `<span class="mock-status-right"><span class="mock-sig-bars" aria-hidden="true"><span></span><span></span><span></span></span><span class="mock-wifi" aria-hidden="true"></span><span class="sig-cell"></span></span>`
    : `<span class="mock-status-right"><span class="sig-dot"></span><span class="sig-dot"></span><span class="sig-cell"></span></span>`;
  uiOverlay.innerHTML = `
    <div class="${shellCls}"></div>
    <div class="${statusCls}"><span>9:27</span>${rightIcons}</div>
    ${fix ? fix.html : ''}
  `;
  uiOverlay.classList.remove('hidden');
}

function navigate(dir) {
  const flow = flows[currentFlowIdx];
  let newScreen = currentScreenIdx + dir;
  let newFlow = currentFlowIdx;

  if (newScreen < 0) {
    // Go to previous flow's last screen
    if (currentFlowIdx > 0) {
      newFlow = currentFlowIdx - 1;
      newScreen = flows[newFlow].screens.length - 1;
    } else return;
  } else if (newScreen >= flow.screens.length) {
    // Go to next flow's first screen
    if (currentFlowIdx < flows.length - 1) {
      newFlow = currentFlowIdx + 1;
      newScreen = 0;
    } else return;
  }

  if (newFlow !== currentFlowIdx) {
    currentFlowIdx = newFlow;
    flowSelectEl.value = String(newFlow);
  }

  currentScreenIdx = newScreen;
  loadScreen(currentFlowIdx, currentScreenIdx, dir > 0 ? 'left' : 'right');
}

function goToScreen(idx) {
  const dir = idx > currentScreenIdx ? 'left' : 'right';
  currentScreenIdx = idx;
  loadScreen(currentFlowIdx, currentScreenIdx, dir);
}

/* === EVENTS === */
function bindEvents() {
  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); navigate(1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
    if (e.key === 'ArrowUp') { e.preventDefault(); switchFlow(Math.max(0, currentFlowIdx - 1)); }
    if (e.key === 'ArrowDown') { e.preventDefault(); switchFlow(Math.min(flows.length - 1, currentFlowIdx + 1)); }
  });

  // Touch swipe on phone screen
  let touchStartX = 0;
  let touchStartY = 0;
  const phoneFrame = document.querySelector('.phone-frame');

  phoneFrame.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  phoneFrame.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      navigate(dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  // Click zones
  document.getElementById('swipeLeft').addEventListener('click', () => navigate(-1));
  document.getElementById('swipeRight').addEventListener('click', () => navigate(1));
  flowSelectEl.addEventListener('change', (e) => {
    switchFlow(parseInt(e.target.value, 10));
  });
}

init();
</script>
